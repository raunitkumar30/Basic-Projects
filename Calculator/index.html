<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="classwrapper">
        <div class="container">
            <!-- <button class="item" data-value="item_res"></button> -->
            <input type="text" class="item item_res" data-value="">
            <button class="item" data-value="C">C</button>
            <button class="item" data-value="%">%</button>
            <button class="item" data-value="X">X</button>
            <button class="item" data-value="/">/</button>
            <button class="item" data-value="7">7</button>
            <button class="item" data-value="8">8</button>
            <button class="item" data-value="9">9</button>
            <button class="item" data-value="*">*</button>
            <button class="item" data-value="4">4</button>
            <button class="item" data-value="5">5</button>
            <button class="item" data-value="6">6</button>
            <button class="item" data-value="-">-</button>
            <button class="item" data-value="1">1</button>
            <button class="item" data-value="2">2</button>
            <button class="item" data-value="3">3</button>
            <button class="item" data-value="+">+</button>
            <button class="item" data-value="00">00</button>
            <button class="item" data-value="0">0</button>
            <button class="item" data-value=".">.</button>
            <button class="item" data-value="=">=</button>
            <!-- <button class="item" data-value="item18">18</button>
            <button class="item" data-value="item19">19</button>
            <button class="item" data-value="item20">20</button>
            <button class="item" data-value="item21">21</button>
            <button class="item" data-value="item22">22</button>
            <button class="item" data-value="item23">23</button>
            <button class="item" data-value="item24">24</button> -->
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
